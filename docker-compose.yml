version: '3.8'

services:

  dashboard:
    build: ./dashboard
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - WEIR_DB_PATH=/data/weir.db
    restart: unless-stopped

  proxy:
    build: ./proxy
    ports:
      - "5455:5455"
    environment:
      - WEIR_TARGET_HOST=${WEIR_TARGET_HOST:-host.docker.internal}
      - WEIR_TARGET_PORT=${WEIR_TARGET_PORT:-5432}
      - WEIR_TARGET_DB=${WEIR_TARGET_DB:-postgres}
      - WEIR_TARGET_USER=${WEIR_TARGET_USER:-postgres}
      - WEIR_TARGET_PASSWORD=${WEIR_TARGET_PASSWORD:-}
      - WEIR_LISTEN_PORT=5455
      - WEIR_DASHBOARD_URL=http://dashboard:8000
      - WEIR_APPROVAL_TIMEOUT=${WEIR_APPROVAL_TIMEOUT:-60}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - dashboard
    restart: unless-stopped